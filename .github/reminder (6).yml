name: Eslatma

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  eslatma:
    runs-on: ubuntu-latest
    steps:
      - name: Xabar yuborish
        run: |
          python3 -c "
import json, urllib.request
from datetime import datetime, timedelta

SUPABASE_URL = 'https://rztbawzfeqqtpbifkgjd.supabase.co'
SUPABASE_KEY = 'sb_publishable_mF63LJOpb_lzR_P_WmmZEA_W5oc8JPD'
BOT_TOKEN = '8535445836:AAHkniWDqi25cLPDutKQY5valMv_naeQ1PI'
CHAT_ID = '-800338592'

today = datetime.now().strftime('%Y-%m-%d')
tomorrow = (datetime.now() + timedelta(days=1)).strftime('%Y-%m-%d')

def db(table, p=''):
    url = SUPABASE_URL + '/rest/v1/' + table + '?select=*' + p
    req = urllib.request.Request(url, headers={'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY})
    try:
        return json.loads(urllib.request.urlopen(req).read().decode())
    except:
        return []

def tg(text):
    url = 'https://api.telegram.org/bot' + BOT_TOKEN + '/sendMessage'
    data = json.dumps({'chat_id': CHAT_ID, 'text': text}).encode()
    urllib.request.urlopen(urllib.request.Request(url, data, {'Content-Type': 'application/json'}))

orders = db('orders', '&status=neq.topshirildi')
bugun = [o for o in orders if o.get('due_date') == today]
ertaga = [o for o in orders if o.get('due_date') == tomorrow]
kechikkan = [o for o in orders if o.get('due_date') and o['due_date'] < today]
tayyor = [o for o in orders if o.get('status') == 'tayyor']

msg = 'Murad Jewellery - ' + today + '\n\n'
if bugun:
    msg += 'BUGUN TOPSHIRISH (' + str(len(bugun)) + ' ta):\n'
    for o in bugun:
        msg += '- ' + str(o.get('client','')) + '\n'
        if o.get('metal_type'): msg += '  ' + str(o['metal_type']) + '\n'
        if o.get('phone'): msg += '  Tel: ' + str(o['phone']) + '\n'
        if o.get('remain'): msg += '  Qoldiq: ' + str(int(o['remain'])) + ' som\n'
if ertaga:
    msg += 'ERTAGA (' + str(len(ertaga)) + ' ta):\n'
    for o in ertaga:
        msg += '- ' + str(o.get('client','')) + '\n'
if kechikkan:
    msg += 'KECHIKKAN (' + str(len(kechikkan)) + ' ta):\n'
    for o in kechikkan:
        msg += '- ' + str(o.get('client','')) + ' - ' + str(o.get('due_date','')) + '\n'
if tayyor:
    msg += 'TAYYOR-KUTMOQDA (' + str(len(tayyor)) + ' ta):\n'
    for o in tayyor:
        msg += '- ' + str(o.get('client','')) + '\n'
if not bugun and not ertaga and not kechikkan:
    msg += 'Yaqin kunlarda topshirish yoq!\n'
msg += '\nmurodzar.netlify.app'
tg(msg)
print('Tayyor!')
"
