```yaml
name: Eslatma

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  eslatma:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}

    steps:
      - name: Telegram xabar
        run: |
          python3 << 'PYTHON'

          import json
          import urllib.request
          from datetime import datetime, timedelta
          import os

          SUPABASE_URL = os.environ['SUPABASE_URL']
          SUPABASE_KEY = os.environ['SUPABASE_KEY']
          BOT_TOKEN = os.environ['BOT_TOKEN']
          CHAT_ID = os.environ['CHAT_ID']

          today = datetime.now().strftime('%Y-%m-%d')
          tomorrow = (datetime.now() + timedelta(days=1)).strftime('%Y-%m-%d')

          def db(table, p=''):
              url = SUPABASE_URL + '/rest/v1/' + table + '?select=*' + p

              req = urllib.request.Request(
                  url,
                  headers={
                      'apikey': SUPABASE_KEY,
                      'Authorization': 'Bearer ' + SUPABASE_KEY
                  }
              )

              try:
                  return json.loads(
                      urllib.request.urlopen(req).read().decode()
                  )
              except:
                  return []

          def tg(text):
              url = 'https://api.telegram.org/bot' + BOT_TOKEN + '/sendMessage'

              data = json.dumps({
                  'chat_id': CHAT_ID,
                  'text': text
              }).encode()

              req = urllib.request.Request(
                  url,
                  data=data,
                  headers={
                      'Content-Type': 'application/json'
                  }
              )

              urllib.request.urlopen(req)

          orders = db('orders', '&status=neq.topshirildi')

          bugun = [
              o for o in orders
              if o.get('due_date') == today
          ]

          ertaga = [
              o for o in orders
              if o.get('due_date') == tomorrow
          ]

          kechikkan = [
              o for o in orders
              if o.get('due_date')
              and o['due_date'] < today
          ]

          tayyor = [
              o for o in orders
              if o.get('status') == 'tayyor'
          ]

          msg = '💍 Murad Jewellery\n'
          msg += '📅 ' + today + '\n\n'

          if bugun:
              msg += '🔴 BUGUN TOPSHIRISH:\n'

              for o in bugun:
                  msg += '• ' + str(o.get('client', '')) + '\n'

                  if o.get('metal_type'):
                      msg += '  Metal: ' + str(o['metal_type']) + '\n'

                  if o.get('phone'):
                      msg += '  Tel: ' + str(o['phone']) + '\n'

                  if o.get('remain'):
                      msg += '  Qoldiq: ' + str(int(o['remain'])) + ' som\n'

                  msg += '\n'

          if ertaga:
              msg += '🟡 ERTAGA:\n'

              for o in ertaga:
                  msg += '• ' + str(o.get('client', '')) + '\n'

              msg += '\n'

          if kechikkan:
              msg += '⚠️ KECHIKKAN:\n'

              for o in kechikkan:
                  msg += '• ' + str(o.get('client', ''))
                  msg += ' - '
                  msg += str(o.get('due_date', ''))
                  msg += '\n'

              msg += '\n'

          if tayyor:
              msg += '✅ TAYYOR BUYURTMALAR:\n'

              for o in tayyor:
                  msg += '• ' + str(o.get('client', '')) + '\n'

              msg += '\n'

          if not bugun and not ertaga and not kechikkan:
              msg += '✅ Yaqin topshiruvlar yoq\n\n'

          msg += '🌐 murodzar.netlify.app'

          tg(msg)

          print('Tayyor!')

          PYTHON
```
