name: Eslatma

on:
  schedule:
    - cron: '0 3 * * *'
    - cron: '0 8 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  eslatma:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Kunlik eslatma
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python3 eslatma.py

      - name: Repo faol saqlash
        continue-on-error: true
        run: |
          git config user.email "bot@murad.uz"
          git config user.name "Murad Bot"
          date > .last_run
          git add .last_run
          git diff --staged --quiet || git commit -m "run: $(date +%Y-%m-%d)"
          git push || echo "Push failed, continuing..."
